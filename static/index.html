<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skufvill Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Martian+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Variables ── */
    :root {
      --bg-deep: #08080a;
      --bg-surface: #111113;
      --bg-elevated: #1a1a1d;
      --bg-hover: #222225;
      --border: #27272a;
      --border-subtle: #1e1e21;

      --text: #ebebed;
      --text-sec: #9898a0;
      --text-muted: #55555e;

      --amber: #d4a843;
      --amber-dim: rgba(212, 168, 67, 0.12);
      --amber-glow: rgba(212, 168, 67, 0.25);

      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.12);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.12);

      --chicken: #f59e0b;
      --chicken-dim: rgba(245, 158, 11, 0.14);
      --fish: #38bdf8;
      --fish-dim: rgba(56, 189, 248, 0.14);
      --meat: #ef4444;
      --meat-dim: rgba(239, 68, 68, 0.14);
      --veg: #22c55e;
      --veg-dim: rgba(34, 197, 94, 0.14);

      --radius: 10px;
      --radius-sm: 6px;

      --font-display: 'Dela Gothic One', system-ui, sans-serif;
      --font-body: 'Outfit', system-ui, sans-serif;
      --font-mono: 'Martian Mono', 'SF Mono', monospace;
    }

    /* ── Base ── */
    html { font-size: 14px; }
    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(circle, #18181b 1px, transparent 1px);
      background-size: 28px 28px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Noise overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Layout ── */
    .app {
      max-width: 1640px;
      margin: 0 auto;
      padding: 20px 28px 60px;
      position: relative;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: var(--amber);
      letter-spacing: 1px;
      white-space: nowrap;
      text-shadow: 0 0 40px var(--amber-glow);
    }
    .logo span { color: var(--text-muted); font-size: 0.7em; margin-left: 8px; }
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
    }
    .search-input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px var(--amber-dim);
    }
    .header-right { display: flex; gap: 10px; margin-left: auto; }
    .scan-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: var(--amber-dim);
      border: 1px solid var(--amber);
      border-radius: var(--radius);
      color: var(--amber);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .scan-btn:hover {
      background: rgba(212, 168, 67, 0.22);
      box-shadow: 0 0 20px var(--amber-dim);
    }
    .scan-btn.running {
      opacity: 0.7;
      pointer-events: none;
    }
    .scan-btn.running .scan-icon { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }
    .stat-card.total::before { background: var(--amber); }
    .stat-card.chicken::before { background: var(--chicken); }
    .stat-card.fish::before { background: var(--fish); }
    .stat-card.meat::before { background: var(--meat); }
    .stat-card.veg::before { background: var(--veg); }

    .stat-number {
      font-family: var(--font-display);
      font-size: 1.8rem;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card.total .stat-number { color: var(--amber); }
    .stat-card.chicken .stat-number { color: var(--chicken); }
    .stat-card.fish .stat-number { color: var(--fish); }
    .stat-card.meat .stat-number { color: var(--meat); }
    .stat-card.veg .stat-number { color: var(--veg); }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text-sec);
      font-weight: 500;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.1s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }
    .stat-card:nth-child(4) { animation-delay: 0.2s; }
    .stat-card:nth-child(5) { animation-delay: 0.25s; }

    /* ── Filters ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-select {
      padding: 8px 32px 8px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236e6e78' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--amber); }
    .filter-select option { background: var(--bg-elevated); color: var(--text); }

    .result-count {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--text-muted);
    }

    /* ── Scan subtype button ── */
    .scan-subtype-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-sec);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .scan-subtype-btn:hover {
      color: var(--amber);
      border-color: var(--amber);
      background: var(--amber-dim);
    }
    .scan-subtype-btn.running {
      color: var(--amber);
      border-color: var(--amber);
      pointer-events: none;
    }
    .scan-subtype-btn.running .scan-subtype-icon { animation: spin 0.8s linear infinite; }
    .scan-subtype-btn.done { color: var(--green); border-color: var(--green); }

    /* ── Table ── */
    .table-wrap {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-scroll {
      overflow-x: auto;
      max-height: calc(100vh - 290px);
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }
    thead { position: sticky; top: 0; z-index: 10; }
    thead th {
      background: var(--bg-elevated);
      padding: 11px 14px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    thead th.sortable { cursor: pointer; transition: color 0.15s; }
    thead th.sortable:hover { color: var(--amber); }
    thead th.sorted { color: var(--amber); }
    .sort-arrow {
      display: inline-block;
      margin-left: 4px;
      font-size: 0.65rem;
      opacity: 0.4;
      transition: opacity 0.15s;
    }
    thead th.sorted .sort-arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.12s;
    }
    tbody tr:hover { background: var(--bg-hover); }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 10px 14px;
      font-size: 0.82rem;
      vertical-align: middle;
      white-space: nowrap;
    }
    td.cell-mono {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      font-weight: 400;
    }

    /* ── Product image ── */
    .product-img {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-img:hover {
      transform: scale(2.8);
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      z-index: 100;
      position: relative;
    }
    .img-placeholder {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.65rem;
    }

    /* ── Product name ── */
    .product-name {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-name a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
    }
    .product-name a:hover { color: var(--amber); }
    td a:hover { color: var(--amber) !important; }
    .family-badge {
      display: inline-block;
      background: var(--amber-dim);
      color: var(--amber);
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0.3px;
    }

    /* ── Type badge ── */
    .type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .type-badge.chicken { background: var(--chicken-dim); color: var(--chicken); }
    .type-badge.fish { background: var(--fish-dim); color: var(--fish); }
    .type-badge.meat { background: var(--meat-dim); color: var(--meat); }
    .type-badge.veg { background: var(--veg-dim); color: var(--veg); }
    .type-badge.unknown { background: var(--bg-elevated); color: var(--text-muted); }

    /* ── Nutrition ── */
    .nutrition {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--text-sec);
    }
    .nutrition .kcal { color: var(--amber); font-weight: 500; }

    /* ── Rating ── */
    .rating {
      font-family: var(--font-mono);
      font-weight: 500;
    }
    .rating-star { color: var(--amber); margin-right: 2px; }

    /* ── Rescan button ── */
    .rescan-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      padding: 0;
    }
    .rescan-btn:hover {
      color: var(--amber);
      border-color: var(--amber);
      background: var(--amber-dim);
    }
    .rescan-btn.spinning svg { animation: spin 0.8s linear infinite; }
    .rescan-btn.done { color: var(--green); border-color: var(--green); }
    .rescan-btn.fail { color: var(--red); border-color: var(--red); }

    /* ── Loading ── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ── Empty ── */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      header { flex-wrap: wrap; }
      .search-wrap { max-width: 100%; order: 3; flex-basis: 100%; }
      .app { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <div class="logo">SKUFVILL CATALOG<span>admin</span></div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" class="search-input" id="search" placeholder="Поиск по названию, типу, категории..." autocomplete="off">
      </div>
      <div class="header-right">
        <button class="scan-btn" id="scanBtn" onclick="triggerScan()">
          <svg class="scan-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
            <polyline points="21 3 21 9 15 9"/>
          </svg>
          Сканировать
        </button>
      </div>
    </header>

    <!-- Stats -->
    <section class="stats" id="stats">
      <div class="stat-card total">
        <div class="stat-number" id="stat-total">--</div>
        <div class="stat-label">Всего блюд</div>
      </div>
      <div class="stat-card chicken">
        <div class="stat-number" id="stat-chicken">--</div>
        <div class="stat-label">Курица</div>
      </div>
      <div class="stat-card fish">
        <div class="stat-number" id="stat-fish">--</div>
        <div class="stat-label">Рыба</div>
      </div>
      <div class="stat-card meat">
        <div class="stat-number" id="stat-meat">--</div>
        <div class="stat-label">Мясо</div>
      </div>
      <div class="stat-card veg">
        <div class="stat-number" id="stat-veg">--</div>
        <div class="stat-label">Вегетарианское</div>
      </div>
    </section>

    <!-- Filters -->
    <section class="filters">
      <select class="filter-select" id="filterType">
        <option value="">Все типы</option>
      </select>
      <select class="filter-select" id="filterSubtype">
        <option value="">Все категории</option>
      </select>
      <button class="scan-subtype-btn" id="scanSubtypeBtn" style="display:none" onclick="scanSubtype()">
        <svg class="scan-subtype-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.22-8.56"/><polyline points="21 3 21 9 15 9"/>
        </svg>
        <span id="scanSubtypeLabel">Сканировать</span>
      </button>
      <span class="result-count" id="resultCount"></span>
    </section>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:56px"></th>
              <th class="sortable" data-key="name">Название <span class="sort-arrow"></span></th>
              <th class="sortable" data-key="type_name">Тип <span class="sort-arrow"></span></th>
              <th class="sortable" data-key="subtype_name">Категория <span class="sort-arrow"></span></th>
              <th class="sortable" data-key="rate">Рейтинг <span class="sort-arrow"></span></th>
              <th class="sortable" data-key="weight">Вес <span class="sort-arrow"></span></th>
              <th>КБЖУ</th>
              <th class="sortable" data-key="last_updated">Обновлено <span class="sort-arrow"></span></th>
              <th style="width:44px"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="9">
                <div class="loading-state">
                  <div class="loading-spinner"></div>
                  <div class="loading-text">Загрузка каталога...</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script>
/* ── State ── */
let allProducts = [];
let typesMap = {};
let subtypesMap = {};
let subtypeUrlsMap = {};
let sortKey = null;
let sortDir = 'asc';

/* ── API ── */
const API = '';

async function fetchAll() {
  const [products, types, subtypes] = await Promise.all([
    fetch(`${API}/products`).then(r => r.json()),
    fetch(`${API}/types`).then(r => r.json()),
    fetch(`${API}/subtypes`).then(r => r.json()),
  ]);

  types.items.forEach(t => { typesMap[t.id] = t.name; });
  subtypes.items.forEach(s => { subtypesMap[s.id] = s.name; if (s.url) subtypeUrlsMap[s.id] = s.url; });

  allProducts = products.map(p => ({
    ...p,
    type_name: p.type_name || typesMap[p.type_id] || null,
    subtype_name: p.subtype_name || subtypesMap[p.subtype_id] || null,
  }));

  populateFilters(types.items, subtypes.items);
  updateStats();
  renderTable();
}

async function triggerScan() {
  const btn = document.getElementById('scanBtn');
  btn.classList.add('running');
  try {
    const res = await fetch(`${API}/scan`, { method: 'POST' });
    const data = await res.json();
    if (data.status === 'already_running') {
      btn.classList.remove('running');
    } else {
      setTimeout(() => {
        btn.classList.remove('running');
        fetchAll();
      }, 5000);
    }
  } catch {
    btn.classList.remove('running');
  }
}

/* ── Filters ── */
function populateFilters(types, subtypes) {
  const typeSelect = document.getElementById('filterType');
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.name} (${t.product_count})`;
    typeSelect.appendChild(opt);
  });

  const subtypeSelect = document.getElementById('filterSubtype');
  subtypes.sort((a, b) => a.name.localeCompare(b.name, 'ru'));
  subtypes.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = `${s.name} (${s.product_count})`;
    subtypeSelect.appendChild(opt);
  });
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const typeId = document.getElementById('filterType').value;
  const subtypeId = document.getElementById('filterSubtype').value;
  let items = allProducts;

  if (search) {
    items = items.filter(p =>
      (p.name && p.name.toLowerCase().includes(search)) ||
      (p.type_name && p.type_name.toLowerCase().includes(search)) ||
      (p.subtype_name && p.subtype_name.toLowerCase().includes(search))
    );
  }
  if (typeId) items = items.filter(p => p.type_id == typeId);
  if (subtypeId) items = items.filter(p => p.subtype_id == subtypeId);

  if (sortKey) {
    items = [...items].sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === 'string') {
        const cmp = va.localeCompare(vb, 'ru');
        return sortDir === 'asc' ? cmp : -cmp;
      }
      return sortDir === 'asc' ? va - vb : vb - va;
    });
  }

  return items;
}

/* ── Stats ── */
function updateStats() {
  const p = allProducts;
  document.getElementById('stat-total').textContent = p.length;
  document.getElementById('stat-chicken').textContent = p.filter(x => x.type_id === 1).length;
  document.getElementById('stat-fish').textContent = p.filter(x => x.type_id === 2).length;
  document.getElementById('stat-meat').textContent = p.filter(x => x.type_id === 3).length;
  document.getElementById('stat-veg').textContent = p.filter(x => x.type_id === 4).length;
}

/* ── Render ── */
function renderTable() {
  const items = getFiltered();
  const tbody = document.getElementById('tbody');

  document.getElementById('resultCount').textContent = `${items.length} из ${allProducts.length}`;

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state">Ничего не найдено</div></td></tr>';
    return;
  }

  tbody.innerHTML = items.map(p => {
    const typeClass = getTypeClass(p.type_id);
    const typeName = p.type_name || '—';
    const subtypeName = p.subtype_name || '—';
    const link = p.link ? `https://vkusvill.ru${p.link}` : null;
    const nameHtml = link
      ? `<a href="${esc(link)}" target="_blank" rel="noopener">${esc(p.name || '—')}</a>`
      : esc(p.name || '—');
    const familyHtml = p.count > 1 ? '<span class="family-badge">2x</span>' : '';

    const imgHtml = p.image
      ? `<img class="product-img" src="${esc(p.image)}" alt="" loading="lazy">`
      : '<div class="img-placeholder">—</div>';

    const weightStr = p.weight != null ? `${formatNum(p.weight)} г` : '—';
    const rateHtml = p.rate != null
      ? `<span class="rating"><span class="rating-star">&#9733;</span>${p.rate.toFixed(1)}</span>`
      : '<span style="color:var(--text-muted)">—</span>';

    const nutritionHtml = buildNutrition(p);
    const updatedStr = p.last_updated ? relativeTime(p.last_updated) : '—';

    return `<tr>
      <td>${imgHtml}</td>
      <td><div class="product-name">${nameHtml}${familyHtml}</div></td>
      <td><span class="type-badge ${typeClass}">${esc(typeName)}</span></td>
      <td style="color:var(--text-sec)">${subtypeUrlsMap[p.subtype_id] ? `<a href="${esc(subtypeUrlsMap[p.subtype_id])}" target="_blank" rel="noopener" style="color:var(--text-sec);text-decoration:none">${esc(subtypeName)}</a>` : esc(subtypeName)}</td>
      <td>${rateHtml}</td>
      <td class="cell-mono">${weightStr}</td>
      <td>${nutritionHtml}</td>
      <td class="cell-mono" style="color:var(--text-muted)">${updatedStr}</td>
      <td>${p.link ? `<button class="rescan-btn" onclick="rescanProduct(${p.id}, this)" title="Пересканировать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/><polyline points="21 3 21 9 15 9"/></svg></button>` : ''}</td>
    </tr>`;
  }).join('');
}

/* ── Sort ── */
function handleSort(th) {
  const key = th.dataset.key;
  if (sortKey === key) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortKey = key;
    sortDir = 'asc';
  }

  document.querySelectorAll('thead th').forEach(h => {
    h.classList.remove('sorted');
    const arrow = h.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = '';
  });
  th.classList.add('sorted');
  th.querySelector('.sort-arrow').textContent = sortDir === 'asc' ? ' \u2191' : ' \u2193';

  renderTable();
}

/* ── Helpers ── */
function getTypeClass(typeId) {
  return { 1: 'chicken', 2: 'fish', 3: 'meat', 4: 'veg' }[typeId] || 'unknown';
}

function buildNutrition(p) {
  if (p.ccals == null && p.prots == null && p.fats == null && p.carbs == null) {
    return '<span style="color:var(--text-muted)">—</span>';
  }
  const c = p.ccals != null ? p.ccals.toFixed(0) : '—';
  const pr = p.prots != null ? p.prots.toFixed(0) : '—';
  const f = p.fats != null ? p.fats.toFixed(0) : '—';
  const ca = p.carbs != null ? p.carbs.toFixed(0) : '—';
  return `<span class="nutrition"><span class="kcal">${c}</span> / ${pr} / ${f} / ${ca}</span>`;
}

function formatNum(n) {
  if (n == null) return '—';
  return Number(n) % 1 === 0
    ? Math.round(n).toLocaleString('ru-RU')
    : n.toLocaleString('ru-RU', { maximumFractionDigits: 1 });
}

function relativeTime(iso) {
  const d = new Date(iso);
  const now = Date.now();
  const diff = Math.floor((now - d.getTime()) / 1000);
  if (diff < 60) return 'только что';
  if (diff < 3600) return `${Math.floor(diff / 60)} мин`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} ч`;
  if (diff < 604800) return `${Math.floor(diff / 86400)} дн`;
  return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Scan subtype ── */
async function scanSubtype() {
  const subtypeId = document.getElementById('filterSubtype').value;
  if (!subtypeId) return;
  const btn = document.getElementById('scanSubtypeBtn');
  const label = document.getElementById('scanSubtypeLabel');
  btn.classList.add('running');
  btn.classList.remove('done');
  label.textContent = 'Сканирую...';
  try {
    const res = await fetch(`${API}/subtypes/${subtypeId}/scan`, { method: 'POST' });
    if (!res.ok) throw new Error(res.statusText);
    label.textContent = 'Запущено...';
    // Poll for updates every 5s until data changes
    const before = allProducts.filter(p => p.subtype_id == subtypeId).length;
    let checks = 0;
    const poll = setInterval(async () => {
      checks++;
      await fetchAll();
      const after = allProducts.filter(p => p.subtype_id == subtypeId).length;
      if (checks >= 3 || after !== before || checks >= 24) {
        clearInterval(poll);
        btn.classList.remove('running');
        btn.classList.add('done');
        label.textContent = 'Готово';
        setTimeout(() => {
          btn.classList.remove('done');
          label.textContent = 'Сканировать';
        }, 3000);
      }
    }, 5000);
  } catch {
    btn.classList.remove('running');
    label.textContent = 'Ошибка';
    setTimeout(() => { label.textContent = 'Сканировать'; }, 2000);
  }
}

function updateScanSubtypeBtn() {
  const subtypeId = document.getElementById('filterSubtype').value;
  const btn = document.getElementById('scanSubtypeBtn');
  btn.style.display = subtypeId ? 'inline-flex' : 'none';
  btn.classList.remove('running', 'done');
  document.getElementById('scanSubtypeLabel').textContent = 'Сканировать';
}

/* ── Rescan ── */
async function rescanProduct(id, btn) {
  btn.classList.add('spinning');
  btn.classList.remove('done', 'fail');
  try {
    const res = await fetch(`${API}/products/${id}/rescan`, { method: 'POST' });
    if (!res.ok) throw new Error(res.statusText);
    const updated = await res.json();
    const idx = allProducts.findIndex(p => p.id === id);
    if (idx !== -1) {
      updated.type_name = updated.type_name || typesMap[updated.type_id] || null;
      updated.subtype_name = updated.subtype_name || subtypesMap[updated.subtype_id] || null;
      allProducts[idx] = updated;
    }
    btn.classList.remove('spinning');
    btn.classList.add('done');
    renderTable();
  } catch {
    btn.classList.remove('spinning');
    btn.classList.add('fail');
  }
  setTimeout(() => btn.classList.remove('done', 'fail'), 2000);
}

/* ── Events ── */
let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderTable, 200);
});
document.getElementById('filterType').addEventListener('change', renderTable);
document.getElementById('filterSubtype').addEventListener('change', () => {
  renderTable();
  updateScanSubtypeBtn();
});

document.querySelectorAll('thead th.sortable').forEach(th => {
  th.addEventListener('click', () => handleSort(th));
});

/* ── Init ── */
fetchAll().catch(err => {
  console.error('Failed to load data:', err);
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="9"><div class="empty-state">Ошибка загрузки данных</div></td></tr>';
});
</script>
